services:
  postgres:
    image: postgres:15-alpine
    container_name: mock-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mockdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mock-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mockdb
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-set}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not-set}
      SECRET_KEY: dev-secret-key-change-in-production
      FRONTEND_URL: http://localhost:3000
      BYPASS_AUTH: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -c "from app.startup import startup; startup(); import uvicorn; uvicorn.run('app.main:app', host='0.0.0.0', port=8000, reload=True)"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: mock-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-set}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
